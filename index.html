<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Guarantor OTC</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - Luxury fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Telegram WebApps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-950 text-slate-100 font-poppins" id="app">
    <!-- Safe Area Top (for notch support) -->
    <div id="safe-top" style="height: var(--tg-safe-area-inset-top, 0px); background: #0f172a;"></div>
    
    <div class="flex flex-col h-screen bg-gradient-to-b from-slate-950 to-slate-900 relative overflow-hidden">
        <!-- Background Effect -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
            <div class="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/3 right-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl"></div>
        </div>
        
        <!-- Main Content Area -->
        <div class="flex-1 overflow-y-auto pb-24 relative z-10" id="content-wrapper">
            
            <!-- Screen: Wallet & Deals (Home) -->
            <div id="screen-home" class="screen-page p-4 space-y-5">
                <!-- Header: User Profile -->
                <div class="pt-3 pb-2">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-400 to-emerald-400 flex items-center justify-center text-slate-950 font-bold text-lg">
                                G
                            </div>
                            <div>
                                <div class="font-semibold text-sm">@guarantoruser</div>
                                <div class="text-xs text-emerald-400 flex items-center gap-1">
                                    <i class="fas fa-check-circle"></i>
                                    Верифицирован • ⭐ 4.9
                                </div>
                            </div>
                        </div>
                        <button class="p-2 hover:bg-slate-800 rounded-lg transition" id="btn-settings">
                            <i class="fas fa-cog text-xl text-slate-400"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Balance Card (Premium) -->
                <div class="balance-card">
                    <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/10 to-emerald-500/10 rounded-2xl pointer-events-none"></div>
                    <div class="relative">
                        <div class="text-sm text-slate-400 mb-2">Ваш баланс</div>
                        <div class="flex items-baseline gap-2 mb-4">
                            <div class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-emerald-300 to-cyan-300 glow-text">
                                12.45
                            </div>
                            <div class="text-2xl text-emerald-400 font-semibold">TON</div>
                        </div>
                        <div class="text-xs text-slate-500">
                            ≈ $98.45 USD
                        </div>
                    </div>
                </div>
                
                <!-- Wallet Address Card -->
                <div class="premium-card">
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="text-xs text-slate-400 mb-2 uppercase tracking-wider">Адрес кошелька для выплат</div>
                            <div class="text-sm font-mono text-slate-300 break-all">
                                UQBm...KZai
                            </div>
                        </div>
                        <button class="p-2 text-emerald-400 hover:text-emerald-300 transition ml-2" id="btn-change-wallet">
                            <i class="fas fa-pencil text-lg"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button class="action-btn bg-gradient-to-br from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400" id="btn-create-deal">
                        <i class="fas fa-plus text-lg"></i>
                        <div class="text-sm font-semibold">Создать</div>
                        <div class="text-xs opacity-90">сделку</div>
                    </button>
                    <button class="action-btn bg-gradient-to-br from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400" id="btn-withdraw">
                        <i class="fas fa-arrow-up text-lg"></i>
                        <div class="text-sm font-semibold">Вывод</div>
                        <div class="text-xs opacity-90">средств</div>
                    </button>
                </div>
                
                <!-- Quick Stats -->
                <div class="grid grid-cols-3 gap-3 pt-3">
                    <div class="premium-card text-center">
                        <div class="text-2xl font-bold text-emerald-400">24</div>
                        <div class="text-xs text-slate-400 mt-1">Успешных</div>
                    </div>
                    <div class="premium-card text-center">
                        <div class="text-2xl font-bold text-cyan-400">3</div>
                        <div class="text-xs text-slate-400 mt-1">Активных</div>
                    </div>
                    <div class="premium-card text-center">
                        <div class="text-2xl font-bold text-slate-400">0</div>
                        <div class="text-xs text-slate-400 mt-1">Споров</div>
                    </div>
                </div>
            </div>
            
            <!-- Screen: My Deals -->
            <div id="screen-deals" class="screen-page hidden p-4 space-y-3">
                <div class="flex items-center justify-between pt-2 mb-4">
                    <h2 class="text-2xl font-bold">Мои сделки</h2>
                    <div class="flex gap-2">
                        <button class="px-3 py-1 rounded-lg bg-emerald-500/20 text-emerald-400 text-xs font-semibold transition hover:bg-emerald-500/30 deals-filter" data-filter="all">Все</button>
                        <button class="px-3 py-1 rounded-lg text-slate-400 text-xs font-semibold transition hover:bg-slate-800 deals-filter" data-filter="active">Активные</button>
                        <button class="px-3 py-1 rounded-lg text-slate-400 text-xs font-semibold transition hover:bg-slate-800 deals-filter" data-filter="completed">Завершены</button>
                    </div>
                </div>
                
                <!-- Deal Cards Container -->
                <div id="deals-list" class="space-y-3">
                    <!-- Deal Item Template (dynamic) -->
                </div>
            </div>
            
            <!-- Screen: Referral Program -->
            <div id="screen-referral" class="screen-page hidden p-4 space-y-4">
                <h2 class="text-2xl font-bold pt-2">Партнерка</h2>
                
                <!-- Copy Link & Stats -->
                <div class="premium-card">
                    <div class="text-center mb-4">
                        <div class="text-sm text-slate-400 mb-3">Получайте до <span class="text-emerald-400 font-bold">40%</span> от комиссии</div>
                        <button class="w-full px-4 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-xl font-semibold text-sm hover:from-emerald-400 hover:to-cyan-400 transition flex items-center justify-center gap-2" id="btn-copy-ref">
                            <i class="fas fa-copy"></i>
                            Копировать ссылку
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-3 border-t border-slate-700">
                        <div class="text-center pt-3">
                            <div class="text-2xl font-bold text-emerald-400">128</div>
                            <div class="text-xs text-slate-400">Приглашено</div>
                        </div>
                        <div class="text-center pt-3">
                            <div class="text-2xl font-bold text-cyan-400">8.5 TON</div>
                            <div class="text-xs text-slate-400">Доход</div>
                        </div>
                    </div>
                </div>
                
                <!-- Referral Levels Tabs -->
                <div class="flex gap-2 overflow-x-auto pb-2" id="level-tabs">
                    <button class="ref-level-tab px-4 py-2 rounded-lg font-semibold text-sm whitespace-nowrap bg-emerald-500/20 text-emerald-400 transition" data-level="1">Level 1 (20%)</button>
                    <button class="ref-level-tab px-4 py-2 rounded-lg font-semibold text-sm whitespace-nowrap text-slate-400 transition" data-level="2">Level 2 (10%)</button>
                    <button class="ref-level-tab px-4 py-2 rounded-lg font-semibold text-sm whitespace-nowrap text-slate-400 transition" data-level="3">Level 3 (5%)</button>
                    <button class="ref-level-tab px-4 py-2 rounded-lg font-semibold text-sm whitespace-nowrap text-slate-400 transition" data-level="4">Level 4 (2%)</button>
                    <button class="ref-level-tab px-4 py-2 rounded-lg font-semibold text-sm whitespace-nowrap text-slate-400 transition" data-level="5">Level 5 (1%)</button>
                </div>
                
                <!-- Referrals List -->
                <div id="referrals-list" class="space-y-2">
                    <!-- Dynamically populated -->
                </div>
            </div>
            
            <!-- Screen: Support -->
            <div id="screen-support" class="screen-page hidden p-4 space-y-3">
                <div class="flex items-center justify-between pt-2 mb-2">
                    <h2 class="text-2xl font-bold">Поддержка</h2>
                    <button class="px-4 py-2 bg-emerald-500 hover:bg-emerald-400 rounded-lg font-semibold text-sm transition" id="btn-new-ticket">
                        <i class="fas fa-plus mr-2"></i>Тикет
                    </button>
                </div>
                
                <!-- Tickets List -->
                <div id="tickets-list" class="space-y-3">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </div>
        
        <!-- Bottom Navigation Bar -->
        <div id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-md border-t border-slate-800/50 flex justify-around items-center h-20 z-50" style="padding-bottom: var(--tg-safe-area-inset-bottom, 0px);">
            <button class="nav-btn active" data-screen="home">
                <i class="fas fa-wallet"></i>
                <span>Кошелек</span>
            </button>
            <button class="nav-btn" data-screen="deals">
                <i class="fas fa-handshake"></i>
                <span>Сделки</span>
            </button>
            <button class="nav-btn" data-screen="referral">
                <i class="fas fa-link"></i>
                <span>Партнерка</span>
            </button>
            <button class="nav-btn" data-screen="support">
                <i class="fas fa-headset"></i>
                <span>Поддержка</span>
            </button>
        </div>
    </div>
    
    <!-- Modal: Create Deal -->
    <div id="modal-create-deal" class="modal hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold">Создать сделку</h3>
                <button class="modal-close" id="modal-create-deal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="form-create-deal" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-300">Сумма (TON)</label>
                    <input type="number" id="input-deal-amount" step="0.01" placeholder="10.00" class="modal-input" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-300">Контрагент (@username)</label>
                    <input type="text" id="input-deal-username" placeholder="@user" class="modal-input" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-300">Описание</label>
                    <textarea id="input-deal-desc" placeholder="Описание сделки..." class="modal-input resize-none h-24"></textarea>
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 rounded-xl font-semibold transition">
                    Создать сделку
                </button>
            </form>
        </div>
    </div>
    
    <!-- Modal: Deal Details -->
    <div id="modal-deal-details" class="modal hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold" id="modal-deal-title">Сделка #1024</h3>
                <button class="modal-close" id="modal-deal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-deal-body" class="space-y-4">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>
    
    <!-- Modal: New Support Ticket -->
    <div id="modal-new-ticket" class="modal hidden">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold">Новый тикет</h3>
                <button class="modal-close" id="modal-ticket-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="form-new-ticket" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-300">Категория</label>
                    <select id="input-ticket-category" class="modal-input">
                        <option value="">Выберите категорию</option>
                        <option value="bug">Баг/Ошибка</option>
                        <option value="transaction">Проблема с транзакцией</option>
                        <option value="dispute">Спор</option>
                        <option value="verification">Верификация</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-slate-300">Описание проблемы</label>
                    <textarea id="input-ticket-text" placeholder="Опишите вашу проблему..." class="modal-input resize-none h-24" required></textarea>
                </div>
                <button type="submit" class="w-full py-3 bg-emerald-500 hover:bg-emerald-400 rounded-xl font-semibold transition">
                    Отправить
                </button>
            </form>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>
    
    <!-- Scripts -->
    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
